name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build standalone executable
        run: python build.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: info-machine-windows
          path: dist/info-machine.exe

  release:
    runs-on: ubuntu-latest
    needs: build-exe
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows EXE
        uses: actions/download-artifact@v4
        with:
          name: info-machine-windows
          path: dist/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Python package
        run: |
          pip install build
          python -m build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/info-machine.exe
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true
          body: |
            ## 📦 Download

            ### Windows (No Python Required)
            Download `info-machine.exe` and run it directly:
            ```
            info-machine.exe info
            info-machine.exe scan
            info-machine.exe health
            ```

            ### Python Package (pip)
            ```bash
            pip install info-machine
            ```

      - name: Publish to PyPI
        if: env.PYPI_TOKEN != ''
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          pip install twine
          twine upload dist/*.whl dist/*.tar.gz
